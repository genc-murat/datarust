name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/pages.yml'
  # Allow manual triggers from the Actions tab.
  workflow_dispatch:

# Permissions needed by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancel runs in-progress.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          cargo install mdbook --locked --no-default-features
          mdbook --version

      - name: Build book
        run: mdbook build book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # mdBook writes its HTML output to <book_dir>/book/.
          path: book/book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
