name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # `cache_key` is a comma-free slug used in the cache key (GitHub Actions
        # forbids commas in cache keys). `features` is passed verbatim to cargo.
        include:
          - { features: "",                              cache_key: "default" }
          - { features: "serde",                         cache_key: "serde" }
          - { features: "rayon",                         cache_key: "rayon" }
          - { features: "matrixmultiply",                cache_key: "matrixmultiply" }
          - { features: "serde,rayon",                   cache_key: "serde-rayon" }
          - { features: "serde,matrixmultiply",          cache_key: "serde-matrixmultiply" }
          - { features: "rayon,matrixmultiply",          cache_key: "rayon-matrixmultiply" }
          - { features: "serde,rayon,matrixmultiply",    cache_key: "serde-rayon-matrixmultiply" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ matrix.cache_key }}-${{ hashFiles('Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --no-default-features --features "${{ matrix.features }}" -- -D warnings

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - { features: "",                              cache_key: "default" }
          - { features: "serde",                         cache_key: "serde" }
          - { features: "rayon",                         cache_key: "rayon" }
          - { features: "matrixmultiply",                cache_key: "matrixmultiply" }
          - { features: "serde,rayon",                   cache_key: "serde-rayon" }
          - { features: "serde,matrixmultiply",          cache_key: "serde-matrixmultiply" }
          - { features: "rayon,matrixmultiply",          cache_key: "rayon-matrixmultiply" }
          - { features: "serde,rayon,matrixmultiply",    cache_key: "serde-rayon-matrixmultiply" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-test-${{ matrix.cache_key }}-${{ hashFiles('Cargo.lock') }}
      - name: Run unit + integration tests
        run: cargo test --no-default-features --features "${{ matrix.features }}" --verbose
      - name: Run doctests
        run: cargo test --no-default-features --features "${{ matrix.features }}" --doc

  msrv:
    name: MSRV (1.70)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.70.0
      - name: Check build with MSRV
        run: cargo check --all-features

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build documentation
        # `-D warnings` is already enforced via RUSTFLAGS in the env block above;
        # `cargo doc` does not accept that flag directly.
        run: cargo doc --all-features --no-deps
