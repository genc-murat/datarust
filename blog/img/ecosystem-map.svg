<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">The Rust ML Ecosystem: Where datarust Fits</text>
  <text x="380" y="48" text-anchor="middle" font-size="12" fill="#64748b">axes: dependency weight (horizontal) × algorithm breadth (vertical)</text>

  <!-- Quadrant background -->
  <rect x="60" y="65" width="640" height="330" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Quadrant lines -->
  <line x1="380" y1="65" x2="380" y2="395" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="60" y1="230" x2="700" y2="230" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Axis labels -->
  <text x="380" y="418" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">External Dependencies →</text>
  <text x="380" y="432" text-anchor="middle" font-size="11" fill="#94a3b8">zero deps · pure Rust ←  → ndarray + BLAS + C/C++</text>

  <text x="22" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="#475569" transform="rotate(-90, 22, 230)">Algorithm Breadth →</text>

  <!-- Quadrant labels -->
  <text x="220" y="85" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">Lightweight + Broad</text>
  <text x="540" y="85" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">Heavy + Broad</text>
  <text x="220" y="388" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">Lightweight + Focused</text>
  <text x="540" y="388" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">Heavy + Specialized</text>

  <!-- datarust bubble -->
  <ellipse cx="150" cy="120" rx="62" ry="42" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="2.5"/>
  <text x="150" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">datarust</text>
  <text x="150" y="133" text-anchor="middle" font-size="10" fill="#16a34a">preprocessing + classical ML</text>
  <text x="150" y="147" text-anchor="middle" font-size="10" fill="#16a34a">zero deps · WASM-ready</text>

  <!-- smartcore bubble -->
  <ellipse cx="540" cy="110" rx="55" ry="38" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">smartcore</text>
  <text x="540" y="124" text-anchor="middle" font-size="10" fill="#d97706">SVM · trees · clustering</text>
  <text x="540" y="138" text-anchor="middle" font-size="10" fill="#d97706">ndarray + BLAS</text>

  <!-- linfa bubble -->
  <ellipse cx="580" cy="190" rx="50" ry="35" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="2"/>
  <text x="580" y="187" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">linfa</text>
  <text x="580" y="203" text-anchor="middle" font-size="10" fill="#2563eb">modular crates</text>
  <text x="580" y="217" text-anchor="middle" font-size="10" fill="#2563eb">ndarray + BLAS</text>

  <!-- candle/burn bubble -->
  <ellipse cx="620" cy="320" rx="55" ry="38" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="2"/>
  <text x="620" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">candle / burn</text>
  <text x="620" y="333" text-anchor="middle" font-size="10" fill="#7c3aed">deep learning</text>
  <text x="620" y="347" text-anchor="middle" font-size="10" fill="#7c3aed">GPU · autograd</text>

  <!-- rusty-machine (archived) -->
  <ellipse cx="470" cy="310" rx="42" ry="30" fill="#94a3b8" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="470" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">rusty-machine</text>
  <text x="470" y="323" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">archived</text>

  <!-- Complementary arrow: datarust → linfa -->
  <path d="M 200 140 Q 350 170 540 175" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowSmall)"/>
  <text x="340" y="160" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">complementary: preprocessing → algorithms</text>

  <defs>
    <marker id="arrowSmall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
