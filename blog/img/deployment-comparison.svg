<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Deployment Footprint: sklearn vs datarust</text>
  <text x="360" y="50" text-anchor="middle" font-size="13" fill="#64748b">log scale · lower is better</text>

  <!-- Axis -->
  <line x1="200" y1="70" x2="200" y2="340" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="200" y1="340" x2="690" y2="340" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Y-axis labels (log scale: 1KB, 10KB, 100KB, 1MB, 10MB, 100MB, 1GB) -->
  <text x="190" y="345" text-anchor="end" font-size="11" fill="#94a3b8">1 KB</text>
  <text x="190" y="300" text-anchor="end" font-size="11" fill="#94a3b8">10 KB</text>
  <text x="190" y="255" text-anchor="end" font-size="11" fill="#94a3b8">100 KB</text>
  <text x="190" y="210" text-anchor="end" font-size="11" fill="#94a3b8">1 MB</text>
  <text x="190" y="165" text-anchor="end" font-size="11" fill="#94a3b8">10 MB</text>
  <text x="190" y="120" text-anchor="end" font-size="11" fill="#94a3b8">100 MB</text>
  <text x="190" y="80" text-anchor="end" font-size="11" fill="#94a3b8">1 GB</text>

  <!-- Grid lines -->
  <line x1="200" y1="300" x2="690" y2="300" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="200" y1="255" x2="690" y2="255" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="200" y1="210" x2="690" y2="210" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="200" y1="165" x2="690" y2="165" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="200" y1="120" x2="690" y2="120" stroke="#f1f5f9" stroke-width="1"/>

  <!-- datarust binary: 2.3MB -->
  <!-- log10(2300KB) = 3.36 → position: 340 - 3.36/3 * 260 = 340 - 291 = ~149 -->
  <rect x="250" y="149" width="80" height="191" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="290" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">2.3 MB</text>
  <text x="290" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">datarust</text>
  <text x="290" y="375" text-anchor="middle" font-size="11" fill="#65a30d">single static binary</text>

  <!-- Python runtime: ~30MB -->
  <!-- log10(30000KB) = 4.48 → 340 - 4.48/3 * 260 = 340 - 388 = ~-48... wait, max is 1GB=10^6KB → 340-260=80 -->
  <!-- Recalc: scale 1KB(y=340) to 1GB(y=80), range=260, log range=6 (10^0 to 10^6) -->
  <!-- 30MB = 30000KB, log10=4.48 → y = 340 - 4.48/6*260 = 340 - 194 = 146 -->
  <rect x="380" y="146" width="80" height="194" rx="4" fill="#f59e0b" opacity="0.85"/>
  <text x="420" y="137" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">~30 MB</text>
  <text x="420" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Python</text>
  <text x="420" y="375" text-anchor="middle" font-size="11" fill="#d97706">interpreter only</text>

  <!-- sklearn Docker: 900MB -->
  <!-- 900MB = 900000KB, log10=5.95 → y = 340 - 5.95/6*260 = 340 - 258 = 82 -->
  <rect x="510" y="82" width="80" height="258" rx="4" fill="#ef4444" opacity="0.85"/>
  <text x="550" y="73" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">~900 MB</text>
  <text x="550" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#b91c1c">sklearn</text>
  <text x="550" y="375" text-anchor="middle" font-size="11" fill="#dc2626">Docker image</text>

  <!-- Annotation arrows -->
  <path d="M 340 149 Q 400 120 460 146" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="400" y="115" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">13× smaller</text>

  <path d="M 470 146 Q 520 100 550 82" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="515" y="65" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">390× smaller</text>

  <!-- Legend note -->
  <text x="445" y="370" text-anchor="middle" font-size="10" fill="#94a3b8">log scale (KB) · measured on Apple Silicon, release build</text>
</svg>
