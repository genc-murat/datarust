<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bfdbfe"/><stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bbf7d0"/><stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ddd6fe"/><stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Raw Data -->
  <rect x="10" y="30" width="150" height="120" rx="10" fill="url(#g1)" stroke="#f59e0b" stroke-width="2"/>
  <text x="85" y="60" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">Raw Data</text>
  <text x="85" y="84" text-anchor="middle" font-size="12" fill="#78350f">tenure: 3, NaN, 48</text>
  <text x="85" y="102" text-anchor="middle" font-size="12" fill="#78350f">charge: 85, 70, 55</text>
  <text x="85" y="120" text-anchor="middle" font-size="12" fill="#78350f">contract: "Monthly"</text>
  <text x="85" y="138" text-anchor="middle" font-size="11" fill="#78350f" font-style="italic">missing values + mixed types</text>

  <!-- Arrow -->
  <line x1="165" y1="90" x2="205" y2="90" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Preprocessing -->
  <rect x="210" y="20" width="200" height="140" rx="10" fill="url(#g2)" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="48" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">ColumnTransformer</text>
  <line x1="230" y1="58" x2="390" y2="58" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <text x="310" y="80" text-anchor="middle" font-size="12" fill="#1e40af">SimpleImputer (mean)</text>
  <text x="310" y="100" text-anchor="middle" font-size="12" fill="#1e40af">StandardScaler</text>
  <text x="310" y="120" text-anchor="middle" font-size="12" fill="#1e40af">OneHotEncoder</text>
  <text x="310" y="146" text-anchor="middle" font-size="11" fill="#1e40af" font-style="italic">type-safe · composable</text>

  <!-- Arrow -->
  <line x1="415" y1="90" x2="455" y2="90" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Model -->
  <rect x="460" y="30" width="160" height="120" rx="10" fill="url(#g3)" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="60" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">LogisticRegression</text>
  <text x="540" y="86" text-anchor="middle" font-size="12" fill="#166534">IRLS (binary)</text>
  <text x="540" y="104" text-anchor="middle" font-size="12" fill="#166534">Softmax (multiclass)</text>
  <text x="540" y="122" text-anchor="middle" font-size="12" fill="#166534">Newton-Raphson</text>
  <text x="540" y="140" text-anchor="middle" font-size="11" fill="#166534" font-style="italic">pure Rust · no BLAS</text>

  <!-- Arrow -->
  <line x1="625" y1="90" x2="665" y2="90" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="670" y="30" width="140" height="120" rx="10" fill="url(#g4)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="740" y="60" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">Predict</text>
  <text x="740" y="86" text-anchor="middle" font-size="12" fill="#5b21b6">P(churn) = 0.87</text>
  <text x="740" y="104" text-anchor="middle" font-size="12" fill="#5b21b6">P(churn) = 0.12</text>
  <text x="740" y="122" text-anchor="middle" font-size="12" fill="#5b21b6">P(churn) = 0.93</text>
  <text x="740" y="140" text-anchor="middle" font-size="11" fill="#5b21b6" font-style="italic">+ save to JSON</text>

  <!-- Bottom: serialize flow -->
  <line x1="740" y1="155" x2="740" y2="185" stroke="#64748b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="660" y="185" width="160" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="740" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">📦 churn_model.json</text>
</svg>
